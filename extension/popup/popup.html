<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px; margin: 0; padding: 18px;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0;
    }
    .header { display: flex; align-items: center; gap: 11px; margin-bottom: 6px; }
    .logo {
      width: 38px; height: 38px; border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #4f46e5 60%, #7c3aed);
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 24px; height: 24px; }
    h1 { font-size: 17px; font-weight: 700; margin: 0; color: #fff; }
    .sub { font-size: 11.5px; color: #94a3b8; }
    p { font-size: 12.5px; line-height: 1.5; color: #94a3b8; margin: 12px 0; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25);
      color: #34d399; padding: 6px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .status-badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .status-badge.disconnected { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.25); color: #f87171; }
    .meta { font-size: 11px; color: #64748b; margin-top: 6px; }
    .btn-toggle {
      width: 100%; margin-top: 16px; padding: 11px;
      background: linear-gradient(135deg, #2563eb, #4f46e5); color: #fff;
      border: none; border-radius: 10px; font-weight: 650; font-size: 14px; cursor: pointer;
    }
    .btn-toggle:hover { filter: brightness(1.08); }
    .hint { font-size: 11px; color: #64748b; margin-top: 12px; text-align: center; }
    a { color: #818cf8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 7V4"/><circle cx="12" cy="3" r="1.3" fill="#fff"/>
        <circle cx="9" cy="13" r="1.3" fill="#fff" stroke="none"/><circle cx="15" cy="13" r="1.3" fill="#fff" stroke="none"/>
        <path d="M9.5 16.5h5"/></svg>
    </div>
    <div>
      <h1>CivicOS AI</h1>
      <div class="sub">Telangana ePASS Copilot</div>
    </div>
  </div>
  <p>I guide students step-by-step through the Telangana ePASS scholarship portal — highlighting exactly which button to click next.</p>
  <div class="status-badge disconnected" id="status">Checking backend…</div>
  <div class="meta" id="meta"></div>

  <button class="btn-toggle" id="btn-toggle">Open Assistant Panel</button>
  <div class="hint">Open <a href="https://telanganaepass.cgg.gov.in/" target="_blank">telanganaepass.cgg.gov.in</a> or the local demo, then ask away.</div>

  <script src="popup.js"></script>
</body>
</html>
